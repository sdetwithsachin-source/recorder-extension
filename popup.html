<!DOCTYPE html>
<html>

<head>
   <meta charset="UTF-8">

  <style>

    body {

      width: 180px;

      padding: 10px;

      font-family: Arial;

      background: #f5f5f5;
    }

    button {

      width: 100%;

      padding: 10px;

      margin-bottom: 8px;

      border: none;

      border-radius: 6px;

      color: white;

      font-size: 14px;

      cursor: pointer;

      font-weight: bold;
    }

    #start {

      background: green;
    }

    #stop {

      background: red;
    }

    button:hover {

      opacity: 0.9;
    }

  </style>

</head>

<body>

  <button id="start">
    🎥 Start Recording
  </button>

  <button id="stop">
    ⏹ Stop Recording
  </button>

  <script src="popup.js"></script>

</body>

</html>
